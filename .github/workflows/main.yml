name: Sort Lib

on:
  push:
  pull_request:


jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: 3.9
    - name: Install tools
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
    - name: Lint with black
      run: |
        python -m black --check --diff .
    - name: Lint with flake8
      run: |
        python -m flake8 . --show-source --statistics --extend-ignore E203


  test:
    # only run the code testing if linting passed
    needs: linting
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ["3.9", "3.10"]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }} on ${{ matrix.os }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
    - name: Test with pytest
      env:
        AVIBE_API_KEY: ${{ secrets.AVIBE_API_KEY }}
      run: |
        python -m pytest -s


  packaging:
    # only run the packaging if testing passed
    needs: test
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ["3.9", "3.10"]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }} on ${{ matrix.os }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt
    - name: Build package Linux
      if: runner.os == 'Linux'
      run: |
        python -m build
        # see that the dist directory contains the wheel
        ls -la dist
    - name: Build package macOS
      if: runner.os == 'macOS'
      run: |
        python -m build
        # see that the dist directory contains the wheel
        ls -la dist
    - name: Build package Windows
      if: runner.os == 'Windows'
      run: |
        python -m build
        # see that the dist directory contains the wheel
        dir dist
    - name: Upload package
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: python-packages-${{ matrix.python-version }}-${{ matrix.os }}
        path: dist
